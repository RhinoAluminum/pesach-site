<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed – Rhino Aluminum</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { background: #091f4a; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
  .card { background: rgba(255,255,255,0.07); border-radius: 16px; padding: 40px 30px; max-width: 480px; width: 100%; text-align: center; }
  .icon { font-size: 4rem; margin-bottom: 16px; }
  h1 { font-size: 1.6rem; color: #F2C94C; margin-bottom: 12px; }
  p { color: rgba(255,255,255,0.8); line-height: 1.6; margin-bottom: 10px; }
  .btn { display: inline-block; margin-top: 24px; background: #F2C94C; color: #091f4a; font-weight: 700; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-size: 1rem; }
  .status { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Payment Received!</h1>
  <p>Thank you for your order. We're processing it now and will be in touch shortly with shipping details.</p>
  <p id="order-summary"></p>
  <a href="https://rhinoaluminum.netlify.app" class="btn">Back to Shop</a>
  <div class="status" id="status-msg">Processing your order...</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(async function() {
  emailjs.init('k8O1Y6eneHrNDLJrZ');

  const rawCust = sessionStorage.getItem('o');
  const rawCart = sessionStorage.getItem('c');
  sessionStorage.removeItem('o');
  sessionStorage.removeItem('c');

  if (!rawCust) {
    document.getElementById('status-msg').textContent = '✓ Payment confirmed.';
    return;
  }

  const cust = JSON.parse(rawCust);
  const cartData = rawCart ? JSON.parse(rawCart) : { items: [], total: '0.00', shipping: '0.00' };

  document.getElementById('order-summary').textContent = 'Order for ' + cust.n + ' · $' + cartData.total;

  const ssOrder = {
    orderNumber: 'PESACH-' + Date.now(),
    orderDate: new Date().toISOString(),
    orderStatus: 'awaiting_shipment',
    customerEmail: cust.e,
    billTo: { name: cust.n, street1: cust.s, city: cust.c, state: cust.st, postalCode: cust.z, country: 'US', phone: cust.ph },
    shipTo:  { name: cust.n, street1: cust.s, city: cust.c, state: cust.st, postalCode: cust.z, country: 'US', phone: cust.ph },
    items: cartData.items,
    amountPaid: parseFloat(cartData.total),
    taxAmount: 0,
    shippingAmount: parseFloat(cartData.shipping),
    internalNotes: 'Requested ship date: ' + cust.d
  };

  try {
    await fetch('/.netlify/functions/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(ssOrder)
    });
    document.getElementById('status-msg').textContent = '✓ Order submitted.';
  } catch(e) {
    document.getElementById('status-msg').textContent = '✓ Payment confirmed.';
  }

  let itemsText = cartData.items.map(i => '• ' + i.name + '  x' + i.quantity + '  =  $' + (i.unitPrice * i.quantity).toFixed(2)).join('\n');
  emailjs.send('service_wjcd686', 'template_q10q4mr', {
    customer_name: cust.n,
    customer_phone: cust.ph,
    customer_email: cust.e,
    customer_address: cust.s + ', ' + cust.c + ', ' + cust.st + ' ' + cust.z,
    customer_city: cust.c,
    ship_date: cust.d,
    order_items: itemsText,
    order_total: '$' + cartData.total
  }).catch(err => console.error('Email error:', err));

})();
</script>
</body>
</html>
